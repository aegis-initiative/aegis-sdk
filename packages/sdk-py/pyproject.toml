[build-system]
requires = ["hatchling"]
build-backend = "hatchling.backends.build"

[project]
name = "aegis-sdk"
version = "0.0.1"
description = "Python client SDK for the AEGIS Governance Platform"
readme = "README.md"
license = "BSL-1.1"
requires-python = ">=3.11"
authors = [
  { name = "AEGIS Initiative", email = "engineering@aegissystems.app" },
]
classifiers = [
  "Development Status :: 1 - Planning",
  "Intended Audience :: Developers",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
]

[project.urls]
Homepage = "https://aegissystems.app"
Repository = "https://github.com/aegis-initiative/aegis-sdk"
Documentation = "https://aegis-docs.com/sdk/python"

[tool.hatch.build.targets.wheel]
packages = ["aegis_sdk"]

[tool.mypy]
strict = true

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
