[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aegis-sdk"
version = "0.1.0"
description = "Python client SDK for the AEGIS governance platform"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [
    { name = "Finnoybu IP LLC" },
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]

# No external runtime dependencies — stdlib only for v1
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[project.urls]
Homepage = "https://aegissystems.app"
Documentation = "https://aegis-docs.com/sdk/python"
Repository = "https://github.com/aegis-initiative/aegis-sdk"
